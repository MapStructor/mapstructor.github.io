<!DOCTYPE html>
<html lang="en">
<head>
  <!-- <script src="platform/sitelock.js"></script> --> <!-- dev lock DISABLED — uncomment to re-lock -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MapStructor</title>
  <link rel="icon" type="image/png" href="images/nittygrittymapping_logo.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --p: #7c5cbf; --p-dark: #6246a8; --p-light: #d9d9d9; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0eaff;

      /*
      ADDITIONAL BACKGROUND COLORS:
      #f5c58b
      #c4adfd
      */
    
      color: #1e1b2e;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 16px clamp(16px, 4vw, 40px);
      z-index: 20;
    }

    nav a {
      color: #6e6585;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    nav a:hover { color: #1e1b2e; background: rgba(255,255,255,0.5); }

    .btn-nav { border: 1px solid rgba(124,92,191,0.3); color: #1e1b2e !important; background: rgba(255,255,255,0.6); }
    .btn-nav:hover { background: var(--p) !important; color: #fff !important; border-color: var(--p) !important; }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(80px, 14vw, 140px) clamp(20px, 6vw, 80px) clamp(56px, 10vw, 100px);
    }

    .hero-logo {
      height: clamp(44px, 7vw, 80px);
      width: auto;
      margin-bottom: clamp(14px, 2.5vw, 24px);
    }

    .hero-title {
      font-size: clamp(44px, 9vw, 92px);
      font-weight: 800;
      color: #1e1b2e;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: clamp(10px, 2vw, 18px);
    }

    .hero-sub {
      font-size: clamp(14px, 1.8vw, 18px);
      color: #9490a8;
      margin-bottom: clamp(32px, 5vw, 52px);
      font-weight: 400;
    }

    .btn-hero {
      display: inline-block;
      background: #1e1b2e;
      color: #fff;
      font-size: clamp(15px, 2vw, 19px);
      font-weight: 700;
      padding: clamp(13px, 1.8vw, 18px) clamp(28px, 4.5vw, 52px);
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: background 0.15s, transform 0.12s;
    }

    .btn-hero:hover { background: #2e2848; transform: translateY(-1px); }

    /* ── Divider ── */
    .section-divider { border: none; border-top: 1px solid rgba(124,92,191,0.15); margin: 0; }

    /* ── Maps section ── */
    main {
      padding: clamp(32px, 5vw, 56px) clamp(20px, 5vw, 64px) clamp(56px, 8vw, 88px);
      max-width: 1600px;
      margin: 0 auto;
    }

    .row { margin-bottom: clamp(32px, 4vw, 56px); }

    .row-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--p);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(150px, 18vw, 340px), 1fr));
      gap: clamp(10px, 1.4vw, 18px);
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(100,80,160,0.08), 0 1px 2px rgba(100,80,160,0.04);
      border: 1px solid #ece9f5;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(100,80,160,0.14), 0 2px 6px rgba(100,80,160,0.06);
      border-color: #ddd8f0;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--p-light);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-thumb svg { opacity: 0.3; }

    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-badge {
      position: absolute;
      top: 7px;
      right: 7px;
      background: rgba(255,255,255,0.88);
      color: var(--p-dark);
      font-size: 10px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: 0.03em;
      backdrop-filter: blur(4px);
    }

    .card-info { padding: 11px 13px 13px; }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #3d3660;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card:hover .card-title { color: var(--p-dark); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30, 27, 46, 0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(3px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 380px;
      position: relative;
      box-shadow: 0 20px 60px rgba(100,80,160,0.2), 0 4px 16px rgba(100,80,160,0.08);
      border: 1px solid #ece9f5;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #1e1b2e;
      margin-bottom: 18px;
      padding-right: 28px;
    }

    .modal-links { display: flex; flex-direction: column; gap: 8px; }

    .modal-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 7px;
      background: var(--p-light);
      color: #3d3660;
      text-decoration: none;
      font-size: 13px;
      border: 1px solid #ddd8f0;
      transition: background 0.13s, border-color 0.13s, color 0.13s;
    }

    .modal-link:hover { background: #e4dff5; border-color: var(--p); color: var(--p-dark); }

    .modal-link svg { flex-shrink: 0; opacity: 0.5; }
    .modal-link:hover svg { opacity: 1; }

    .modal-link-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: #b8b0d4;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 5px;
      transition: color 0.13s, background 0.13s;
    }

    .modal-close:hover { color: #1e1b2e; background: var(--p-light); }

    /* ── Footer ── */
    footer {
      padding: 24px clamp(20px, 5vw, 64px);
      border-top: 1px solid #ece9f5;
      font-size: 11px;
      color: #b8b0d4;
    }

    footer a { color: #b8b0d4; text-decoration: none; }
    footer a:hover { color: var(--p); }

    button.btn-hero { border: none; font-family: inherit; cursor: pointer; }
    .btn-hero:disabled { opacity: 0.6; cursor: default; transform: none !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="platform/auth.js"></script>
  <script src="platform/topbar.js"></script>
</head>
<body>

  <nav>
    <a href="services.html" id="nav-services">Map Services</a>
    <a href="about.html" id="nav-about">About</a>
    <a href="#" class="btn-nav" id="nav-auth">Login</a>
  </nav>

  <div class="hero">
    <img class="hero-logo" src="images/nittygrittymapping_logo.png" alt="MapStructor logo">
    <div class="hero-title">MapStructor</div>
    <p class="hero-sub" data-edit="home-tagline">Create and explore maps</p>
    <button id="btn-create-map" class="btn-hero">Create a Map</button>
    <span class="free-tag" id="free-tag" title="Why it's free" style="display:inline-block;margin-left:12px;background:#e6f6ea;color:#2d7a2d;font-weight:700;font-size:13px;padding:4px 12px;border-radius:20px;vertical-align:middle;cursor:pointer;">Free</span>
  </div>

  <hr class="section-divider">

  <main>
    <div class="row">
      <div class="row-label">Maps</div>
      <div class="cards" id="cards"></div>
    </div>
  </main>

  <footer>
    <a href="https://github.com/MapStructor" target="_blank">github.com/MapStructor</a>
  </footer>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-links" id="modal-links"></div>
      <!-- Free-tag pop-up content — the LIVE data-edit region lives INSIDE the modal, so the owner edits it
           right in the pop-up (pageEditor: enter edit mode, click the Free tag, type). It is a dedicated
           sibling of #modal-links: other modal flows only ever write #modal-title/#modal-links, so nothing
           can clobber this region; closeModal() restores the display states for the next open. -->
      <div id="free-modal-src" data-edit="home-free" style="display:none;text-align:left;font-size:14px;line-height:1.55;color:#3a3550;">
        <p>MapStructor is free to make and explore maps. You only pay if you need a lot of storage for large datasets.</p>
        <p>Create a map, draw on it, bring in your own data, and share it — no cost to get started.</p>
      </div>
    </div>
  </div>

  <!-- Login / signup modal now lives in platform/auth.js (MapAuth.openAuthModal) — shared with the editor -->

  <script src="config.js"></script>
  <script>
    var PLACEHOLDER = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9b8ec4" stroke-width="1.5"><circle cx="12" cy="10" r="4"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>';

    var githubIcon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>';
    var linkIcon   = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

    // Render cards
    var container = document.getElementById('cards');
    PROJECTS.forEach(function(p) {
      var isLogo = !p.thumb;
      var thumbSrc = p.thumb || 'images/nittygrittymapping_logo.png';   // default thumbnail = MapStructor logo
      var imgStyle = isLogo ? ' style="object-fit:contain;padding:18px;box-sizing:border-box;background:#f3f0fa;"' : '';
      var thumbHtml = '<div class="card-thumb"><img src="' + thumbSrc + '" alt="' + p.title + '"' + imgStyle + '>' + (p.badge ? '<span class="card-badge">' + p.badge + '</span>' : '') + '</div>';
      var card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = thumbHtml
                     + '<div class="card-info"><div class="card-title">' + p.title + '</div></div>';
      card.addEventListener('click', function() { openModal(p); });
      container.appendChild(card);
    });

    // Modal
    var overlay    = document.getElementById('modal-overlay');
    var modalTitle = document.getElementById('modal-title');
    var modalLinks = document.getElementById('modal-links');

    function openModal(p) {
      modalTitle.textContent = p.title;
      modalLinks.innerHTML = '';

      if (p.github) {
        var a = document.createElement('a');
        a.className = 'modal-link';
        a.href = p.github;
        a.target = '_blank';
        a.rel = 'noopener';
        a.innerHTML = githubIcon + '<span class="modal-link-label">' + p.github.replace('https://', '') + '</span>';
        modalLinks.appendChild(a);
      }

      if (p.live) {
        var b = document.createElement('a');
        b.className = 'modal-link';
        b.href = p.live;
        b.target = '_blank';
        b.rel = 'noopener';
        b.innerHTML = linkIcon + '<span class="modal-link-label">' + p.live.replace('https://', '') + '</span>';
        modalLinks.appendChild(b);
      }

      overlay.classList.add('open');
    }

    function closeModal() {
      overlay.classList.remove('open');
      // restore the shared modal shell (the Free pop-up hides #modal-links while it shows) — null-guarded
      // so this can never break other modal flows, whatever gets added later
      var fsrc = document.getElementById('free-modal-src'); if (fsrc) fsrc.style.display = 'none';
      if (modalLinks) modalLinks.style.display = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    // About / Map Services info modals (copy drafted from the dev plan — plain, direct, never corporate)
    function openInfoModal(title, html) {
      modalTitle.textContent = title;
      modalLinks.innerHTML = '<div style="text-align:left;font-size:14px;line-height:1.55;color:#3a3550;">' + html + '</div>';
      overlay.classList.add('open');
    }
    // About / Map Services are now their own pages (about.html / services.html) — the nav links point there.

    // Free tag → opens the editable "why it's free" pop-up. The LIVE data-edit region shows inside the
    // modal (not a copy), so in page-edit mode the owner clicks Free and types directly in the pop-up.
    (function () {
      var ft = document.getElementById('free-tag');
      if (ft) ft.addEventListener('click', function () {
        var src = document.getElementById('free-modal-src');
        modalTitle.textContent = 'Free';
        if (src) { modalLinks.style.display = 'none'; src.style.display = 'block'; }
        else { modalLinks.innerHTML = ''; }   // region missing (shouldn't happen) — still open a clean modal
        overlay.classList.add('open');
      });
    })();
  </script>

  <script>
    var db = (window.MapAuth && MapAuth.db) || supabase.createClient(
      'https://eqpxlwbjqiwfjlsuapvu.supabase.co',
      'sb_publishable_ijLmSmMUeNBrgMGL8Aol4g_S5-xwUzD'
    );

    document.getElementById('btn-create-map').addEventListener('click', async function () {
      var btn = this;
      btn.textContent = 'Creating…';
      btn.disabled = true;

      var u = (window.MapAuth) ? await MapAuth.currentUser() : null;
      if (!u) { var a = await db.auth.signInAnonymously(); if (a.error) { btn.textContent = 'Create a Map'; btn.disabled = false; return; } u = a.data && a.data.user; }

      var { data, error } = await db
        .from('projects')
        .insert({ name: 'Untitled Map', user_id: u && u.id, is_public: false })   // scope to creator (was null → every account saw every map); private by default
        .select('id')
        .single();

      if (error || !data) { btn.textContent = 'Create a Map'; btn.disabled = false; return; }

      window.location.href = 'map/editor.html?id=' + data.id;
    });
  </script>

  <script>
    // Nav account state — opens the shared MapAuth modal when logged out, links to the dashboard when signed in.
    (function () {
      var navAuth = document.getElementById('nav-auth');
      async function refreshNav() {
        if (!window.MapAuth) return;
        var u = await MapAuth.currentUser();
        if (MapAuth.isReal(u)) {
          navAuth.textContent = u.email;
          navAuth.href = 'dashboard.html';
          navAuth.title = 'Your maps & account';
          navAuth.onclick = null;
        } else {
          navAuth.textContent = 'Login';
          navAuth.href = '#';
          navAuth.title = '';
          navAuth.onclick = function (e) { e.preventDefault(); MapAuth.openAuthModal('login'); };
        }
      }
      refreshNav();
      if (window.MapAuth) MapAuth.onChange(function () { refreshNav(); });
    })();
  </script>

  <script src="platform/pageEditor.js"></script>
</body>
</html>
