<!DOCTYPE html>
<html lang="en">
<head>
  <!-- <script src="platform/sitelock.js"></script> --> <!-- dev lock DISABLED — uncomment to re-lock -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — MapStructor</title>
  <link rel="icon" type="image/png" href="images/nittygrittymapping_logo.png">
  <style>
    :root { --p: #7c5cbf; --ink: #1e1b2e; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Source Sans Pro', system-ui, Arial, sans-serif; color: var(--ink); background: #faf9fd; }
    nav { display: flex; align-items: center; gap: 16px; padding: 14px 26px; border-bottom: 1px solid #eae6f3; background: #fff; }
    nav a.brand { font-weight: 800; font-size: 18px; color: var(--ink); text-decoration: none; }
    main { max-width: 880px; margin: 0 auto; padding: 34px 24px 80px; }
    h1 { font-size: 28px; margin: 4px 0 2px; }
    .handle { color: var(--p); font-weight: 700; }
    .bio { color: #4a4560; font-size: 15px; margin: 6px 0 26px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .card { border: 1px solid #eae6f3; border-radius: 12px; overflow: hidden; background: #fff; text-decoration: none; color: inherit; transition: transform .1s, box-shadow .1s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,92,191,.16); }
    .card-thumb { height: 120px; background: #f3f0fa; display: flex; align-items: center; justify-content: center; }
    .card-thumb img { width: 54px; height: 54px; opacity: .85; }
    .card-info { padding: 12px 14px; }
    .card-title { font-weight: 600; }
    .card-meta { font-size: 12px; color: #9a93ad; margin-top: 2px; }
    .empty, .notfound { color: #6b6680; font-size: 15px; margin-top: 30px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="platform/auth.js"></script>
  <script src="platform/topbar.js"></script>
</head>
<body>
  <nav><a class="brand" href="index.html">MapStructor</a></nav>
  <main>
    <h1 id="title">Loading…</h1>
    <p class="bio" id="bio"></p>
    <div class="grid" id="maps"></div>
    <div id="status"></div>
  </main>

  <script>
    (async function () {
      var LOGO = 'images/nittygrittymapping_logo.png';
      var db = (window.MapAuth && MapAuth.db) || (window.supabase && supabase.createClient('https://eqpxlwbjqiwfjlsuapvu.supabase.co', 'sb_publishable_ijLmSmMUeNBrgMGL8Aol4g_S5-xwUzD'));
      var uname = (new URLSearchParams(location.search).get('u') || '').trim();
      var titleEl = document.getElementById('title'), bioEl = document.getElementById('bio'), mapsEl = document.getElementById('maps'), statusEl = document.getElementById('status');
      function esc(s) { return String(s == null ? '' : s).replace(/[<>&]/g, function (c) { return ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' })[c]; }); }
      if (!uname || !db) { titleEl.textContent = 'Profile'; statusEl.innerHTML = '<p class="notfound">No profile specified.</p>'; return; }

      var pr = await db.from('profiles').select('id,username,display_name,bio').eq('username', uname).maybeSingle();
      if (pr.error || !pr.data) { titleEl.textContent = '@' + uname; statusEl.innerHTML = '<p class="notfound">No such user.</p>'; return; }
      var prof = pr.data;
      titleEl.innerHTML = (prof.display_name ? esc(prof.display_name) + ' ' : '') + '<span class="handle">@' + esc(prof.username) + '</span>';
      if (prof.bio) bioEl.textContent = prof.bio; else bioEl.style.display = 'none';
      document.title = '@' + prof.username + ' — MapStructor';

      var ps = await db.from('projects').select('id,name,updated_at').eq('user_id', prof.id).eq('is_public', true).order('updated_at', { ascending: false });
      var maps = (ps.data) || [];
      if (!maps.length) { statusEl.innerHTML = '<p class="empty">No public maps yet.</p>'; return; }
      mapsEl.innerHTML = maps.map(function (m) {
        var date = '';
        try { date = m.updated_at ? new Date(m.updated_at).toLocaleDateString() : ''; } catch (e) {}
        return '<a class="card" href="map/index.html?id=' + m.id + '">'
          + '<div class="card-thumb"><img src="' + LOGO + '" alt=""></div>'
          + '<div class="card-info"><div class="card-title">' + esc(m.name || 'Untitled Map') + '</div><div class="card-meta">' + date + '</div></div></a>';
      }).join('');
    })();
  </script>
  <script src="platform/pageEditor.js"></script>
</body>
</html>
