    <!-- Save-to-account: anonymous maps live only at their URL; claim them via the shared MapAuth modal (dev plan Step 6 funnel).
         Sits just past the header's bottom edge (slight overlap for attention), clear of the ABOUT button. -->
    <style>
      @keyframes sa-in { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes sa-pulse {
        0%, 100% { box-shadow: 0 6px 20px rgba(0,0,0,.16), 0 0 0 0 rgba(124,92,191,.45); }
        50%      { box-shadow: 0 6px 20px rgba(0,0,0,.16), 0 0 0 9px rgba(124,92,191,0); }
      }
      #save-acct { animation: sa-in .45s ease-out, sa-pulse 2s ease-out .5s 3; }
      #sa-open:hover { background: #6246a8 !important; }
    </style>
    <div id="save-acct" style="position:fixed;top:112px;right:14px;z-index:3000;display:none;background:#fff;border:2px solid #7c5cbf;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.16);padding:12px 14px;font-family:'Source Sans Pro',Arial,sans-serif;font-size:13px;width:240px;color:#1e1b2e;">
      <div style="font-weight:700;font-size:14px;margin-bottom:3px;">Save your map to an account</div>
      <div style="font-size:12px;color:#6b6680;">Login or register and save so you don't lose it.</div>
      <button id="sa-open" style="margin-top:9px;width:100%;padding:8px;border:none;border-radius:7px;background:#7c5cbf;color:#fff;cursor:pointer;font-weight:700;font-size:13px;">Save to account</button>
    </div>
    <script>
      (function () {
        if (!window.MapAuth) return;
        var box = document.getElementById('save-acct');
        var tries = 0;
        function place() {   // immediately RIGHT of the tool area (never over the right-side info panel)
          try {
            var dock = document.getElementById('editor-tool-dock');   // editor tool dock (editing.js) — may not exist yet, or ever (standalone deploys)
            if (dock) {
              var r = dock.getBoundingClientRect();
              if (r.width) {
                var bw = box.offsetWidth || 276;
                var L = Math.min(r.right + 16, window.innerWidth - bw - 8);   // clamp on narrow windows — never off-screen
                box.style.left = Math.max(8, L) + 'px'; box.style.right = 'auto'; box.style.top = Math.max(46, Math.round(r.top)) + 'px';
                return;
              }
            }
            // fallback (no dock): just under the header, or under the top bar when the header is hidden
            var hd = document.querySelector('.header'); var b = hd ? hd.getBoundingClientRect().bottom : 0;
            box.style.top = (b > 0 ? b - 12 : 46) + 'px';
          } catch (e) {}
        }
        // the dock docks asynchronously and can move on header show/hide — track it briefly, then rely on resize events
        var _pl = setInterval(place, 800); setTimeout(function () { clearInterval(_pl); }, 15000);
        // Show only WITH the rest of the UI, not before it: wait for the tool dock's reveal (editing.js
        // unhides it once the map controls have docked) — capped so standalone deploys (no dock) still show.
        function uiReady() { try { var d = document.getElementById('editor-tool-dock'); return d ? getComputedStyle(d).visibility !== 'hidden' : false; } catch (e) { return false; } }
        var _uiw = 0;
        function showWhenReady() {
          if (box.style.display === 'block') return;
          if (uiReady() || _uiw++ > 24) { place(); box.style.display = 'block'; }
          else setTimeout(showWhenReady, 500);
        }
        function check() {   // the editor signs in anonymously async — poll until the session exists, then show for anon only
          MapAuth.currentUser().then(function (u) {
            if (u) { if (MapAuth.isReal(u)) { box.style.display = 'none'; } else showWhenReady(); return; }
            if (tries++ < 12) setTimeout(check, 600);
          });
        }
        check();
        MapAuth.onChange(function () { check(); });   // hide once the map is claimed
        window.addEventListener('resize', place);
        document.getElementById('sa-open').addEventListener('click', function () { MapAuth.openAuthModal('signup'); });
      })();
    </script>
  </body>
</html>
