<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Upload Test — Mapstructor</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="upload.css">
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-header">
      <span id="page-title">Upload Test</span>
    </div>

    <label id="drop-zone">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 16 12 12 8 16"></polyline>
        <line x1="12" y1="12" x2="12" y2="21"></line>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
      </svg>
      <span class="drop-label-main">Drop files or click to browse</span>
      <span class="drop-label-hint">GeoJSON &nbsp;·&nbsp; KML &nbsp;·&nbsp; SHP (ZIP) &nbsp;·&nbsp; GeoTIFF</span>
      <input type="file" id="file-input" multiple
        accept=".geojson,.json,.kml,.kmz,.zip,.tif,.tiff">
    </label>

    <div id="layer-list"></div>
  </div>

  <div id="map"></div>

  <div id="toast" class="hidden"></div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tmcw/togeojson/dist/togeojson.umd.js"></script>
  <script src="https://unpkg.com/shpjs@4.0.4/dist/shp.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
  <script src="../../js/mapbox-token.js"></script>
  <script src="upload.js"></script>
</body>
</html>
