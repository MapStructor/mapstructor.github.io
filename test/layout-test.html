<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Layout Test</title>

    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700,600italic" rel="stylesheet" type="text/css" />

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-compare/v0.4.0/mapbox-gl-compare.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-compare/v0.4.0/mapbox-gl-compare.css" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="../map/engine/engine.css" rel="stylesheet" />

    <script src="features.js"></script>
    <script>
      // Apply features config to <html> before body parses —
      // maps will be born at the correct size, no resize needed.
      (function () {
        var h = document.documentElement;
        if (!features.header)   h.setAttribute("data-no-header",   "");
        if (!features.timeline) h.setAttribute("data-no-timeline", "");
        if (!features.sidebar)  h.setAttribute("data-no-sidebar",  "");
      })();
    </script>

    <style>
      html, body {
        height: 100%; margin: 0; padding: 0;
        overflow: hidden;
        display: flex; flex-direction: column;
      }

      .header { flex: 0 0 auto; border-bottom: 2px solid #b0691d; }

      #middle {
        flex: 1 1 auto;
        position: relative;
        min-height: 0;
      }

      #comparison-container { position: absolute; inset: 0; }
      .map {
        position: absolute; inset: 0;
        top: 0 !important; bottom: 0 !important;
        width: 100%; height: 100%;
        border-top: none !important;
      }

      #studioMenu {
        position: absolute;
        top: 0; left: 0;
        height: 100%; max-height: 100%;
        box-sizing: border-box;
      }
      #view-hide-layer-panel { position: absolute; top: 8px; left: 325px; }
      #datepanel { position: absolute; bottom: 20px; right: 20px; }

      #footer { flex: 0 0 auto; position: static; height: auto; }

      html[data-no-header]   .header   { display: none; }
      html[data-no-timeline] #datepanel,
      html[data-no-timeline] #footer   { display: none; }
      html[data-no-sidebar]  #studioMenu,
      html[data-no-sidebar]  #view-hide-layer-panel,
      html[data-no-sidebar]  #mobi-view-sidebar { display: none; }
    </style>
  </head>

  <body>

    <div class="header">
      <a id="logo-link" href="" target="_blank">
        <img id="logo-img-wide" src="../map/test_project/icons/banner_thumbnail.png" align="middle" />
      </a>
      <div id="header_text" class="headerText">
        <span id="headerTextSuffix">|</span>
        <span id="header-text-value">Layout Test</span>
      </div>
      <div class="header-right">
        <i class="fa fa-2x fa-info-circle" id="info"></i>
      </div>
    </div>

    <div id="middle">

      <button id="view-hide-layer-panel">
        <br /><span id="dir-txt">&#9204;</span><br /><br />
      </button>

      <div id="studioMenu">
        <i id="mobi-hide-sidebar" class="fa fa-arrow-circle-left fa-3x"></i>
        <p class="title">LAYERS</p>
        <br />
        <div id="layers-panel-content">
          <p style="padding: 10px; color: #999;">(empty sidebar)</p>
        </div>
      </div>

      <div id="comparison-container">
        <div id="before" class="map"></div>
        <div id="after" class="map"></div>
      </div>

      <div id="mobi-view-sidebar"><i class="fa fa-bars fa-2x"></i></div>

      <div id="datepanel">
        <b><span id="date">01 Jan 1900</span></b>
      </div>

    </div>

    <div id="footer">
      <div id="slider">
        <div id="mobi-year">...</div>
        <div class="timeline">
          <div class="year"><span>1900</span><span class="timeline-ruler"></span></div>
          <div class="year"><span>1925</span><span class="timeline-ruler"></span></div>
          <div class="year"><span>&#8678; TIME SLIDE &#8680;</span><span class="timeline-ruler"></span></div>
          <div class="year"><span>1975</span><span class="timeline-ruler"></span></div>
          <div class="year"><span>2000</span><span class="timeline-ruler"></span></div>
        </div>
      </div>
    </div>

    <script>
      mapboxgl.accessToken = "pk.eyJ1Ijoibml0dHlqZWUiLCJhIjoiY21tcGlyeWt0MHExYzJ5b2VqcGJhdDRieSJ9.Ai9ymb2G5htA_2sUSB2GPg";

      var center = [-93.63661, 42.03112];
      var zoom   = 13.63;
      var leftStyle  = "mapbox://styles/nittyjee/cmmdxrf57001901qserwbevvc";
      var rightStyle = "mapbox://styles/nittyjee/cmmlhhgbj00c701s915u3f0nr";

      var beforeMap = new mapboxgl.Map({
        container: "before", style: leftStyle, center: center, zoom: zoom,
        projection: "mercator", attributionControl: true,
      });
      var afterMap = new mapboxgl.Map({
        container: "after", style: rightStyle, center: center, zoom: zoom,
        projection: "mercator", attributionControl: true,
      });

      new mapboxgl.Compare(beforeMap, afterMap, "#comparison-container", {});

      beforeMap.addControl(new mapboxgl.NavigationControl(), "bottom-right");
      afterMap.addControl(new mapboxgl.NavigationControl(), "bottom-right");
    </script>
  </body>
</html>
