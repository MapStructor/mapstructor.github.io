<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapstructor — Create a Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet"/>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="../../../mapbox-token.js"></script>
  <link rel="stylesheet" href="create.css"/>
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-header">
      <span id="project-name" contenteditable="true" spellcheck="false">Untitled Map</span>
    </div>

    <div id="layer-list"></div>

    <div id="sidebar-footer">
      <button id="add-layer-btn">+ Layer</button>
      <button id="add-group-btn">+ Group</button>
      <button id="add-section-btn">+ Section</button>
      <button id="add-tileset-btn">+ Tileset</button>
      <input id="add-input" type="text" placeholder="Name..." autocomplete="off" spellcheck="false" style="display:none"/>
    </div>
  </div>

  <div id="attr-panel" class="hidden">
    <div id="attr-panel-header">
      <span id="attr-panel-layer-name">Attributes</span>
      <div id="attr-panel-header-btns">
        <button id="btn-attr-expand">Expand</button>
        <button id="attr-panel-close">✕</button>
      </div>
    </div>
    <div id="attr-table-wrap">
      <table id="attr-table"></table>
    </div>
  </div>

  <div id="map-area">
    <div id="map"></div>
    <div id="toolbar">
      <button id="btn-undo" disabled title="Ctrl+Z">Undo</button>
      <button id="btn-redo" disabled title="Ctrl+Y">Redo</button>
      <div class="toolbar-sep"></div>
      <button id="btn-copy"  disabled title="Ctrl+C">Copy</button>
      <button id="btn-paste" disabled title="Ctrl+V">Paste</button>
      <div class="toolbar-sep"></div>
      <button id="btn-merge" disabled>Merge</button>
      <div class="toolbar-sep"></div>
      <button id="btn-split"        disabled>Split</button>
      <button id="btn-cancel-split" style="display:none">Cancel Split (Esc)</button>
      <div class="toolbar-sep"></div>
      <button id="btn-measure-dist">Distance</button>
      <button id="btn-measure-area">Area</button>
      <button id="btn-measure-clear" style="display:none">Clear (Esc)</button>
      <div class="toolbar-sep"></div>
      <button id="btn-attr-table">Table</button>
      <div class="toolbar-sep"></div>
      <select id="basemap-select"></select>
    </div>
  </div>

  <div id="draw-panel">
    <div id="no-selection">&#8592; Select a layer to style</div>
    <div id="draw-editor" style="display:none">
      <div id="draw-title-bar">
        <span id="draw-layer-name"></span>
        <span id="draw-type-badge"></span>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="form">Form</button>
        <button class="tab-btn" data-tab="json">JSON</button>
      </div>
      <div id="tab-form"></div>
      <div id="tab-json" style="display:none">
        <textarea id="json-editor" spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <div id="measure-display" class="hidden"></div>

  <div id="feature-panel" class="hidden">
    <div id="feature-panel-header">
      <span id="feature-panel-layer-name"></span>
      <button id="feature-panel-close">✕</button>
    </div>
    <div id="feature-fields">
      <label>Label</label>
      <input type="text" id="feature-label" placeholder="Name this feature"/>
      <label>Notes</label>
      <textarea id="feature-notes" placeholder="Add notes..."></textarea>
    </div>
    <div id="feature-measurements"></div>
    <div id="feature-panel-footer">
      <button id="delete-feature-btn">Delete</button>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <div id="dbg-panel">
    <div id="dbg-header">
      <span>Debug</span>
      <button id="dbg-copy">Copy</button>
      <button id="dbg-clear">Clear</button>
      <button id="dbg-toggle">▾</button>
    </div>
    <div id="dbg-log"></div>
  </div>

  <script src="create.js"></script>
</body>
</html>
